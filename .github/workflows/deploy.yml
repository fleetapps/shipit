name: Deploy to Cloudflare

# Required API Token Permissions:
# - Account → Workers Scripts → Edit
# - Account → Workers KV Storage → Edit
# - Account → D1 → Edit
# - Account → Containers → Edit
# - Account → Account Settings → Read (CRITICAL for container registry push)
# - Account → R2 Storage → Edit (if using R2)
# - Account → AI Gateway → Read, Edit, Run
#
# IMPORTANT: Container registry push requires "Account Settings: Read" permission!
# Without this, you'll get "Unauthorized" errors even with Containers:Edit.

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify API Token Permissions
        run: |
          echo "🔍 Verifying API token permissions..."
          TOKEN_VERIFY=$(curl -s -X GET "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          
          echo "$TOKEN_VERIFY" | jq '.' || echo "$TOKEN_VERIFY"
          
          if echo "$TOKEN_VERIFY" | grep -q '"status":"active"'; then
            echo "✅ API token is active"
          else
            echo "❌ API token verification failed"
            echo "Please check that CLOUDFLARE_API_TOKEN secret is set correctly"
            exit 1
          fi
          
          echo ""
          echo "🔍 Testing container registry API access (the endpoint that's failing)..."
          CONTAINER_TEST=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/containers/me" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          
          echo "Container API response:"
          echo "$CONTAINER_TEST" | jq '.' || echo "$CONTAINER_TEST"
          
          if echo "$CONTAINER_TEST" | grep -q '"success":true'; then
            echo "✅ Container registry API access verified - deployment should work!"
          elif echo "$CONTAINER_TEST" | grep -q '"code":10000'; then
            echo ""
            echo "❌ Container registry API returned authentication error (401 Unauthorized)"
            echo "This is the EXACT error causing deployment to fail."
            echo ""
            echo "🔧 SOLUTION: Your API token is missing required permissions."
            echo ""
            echo "📋 REQUIRED Permissions (check in Cloudflare Dashboard):"
            echo "   1. Account → Containers → Edit (MUST HAVE)"
            echo "   2. Account → Account Settings → Read (MUST HAVE - for registry auth)"
            echo ""
            echo "📝 Steps to fix:"
            echo "   1. Go to: https://dash.cloudflare.com/profile/api-tokens"
            echo "   2. Find your API token"
            echo "   3. Click 'Edit' and ensure BOTH permissions above are checked"
            echo "   4. Save the token"
            echo "   5. Wait 1-2 minutes for permissions to propagate"
            echo "   6. Update CLOUDFLARE_API_TOKEN in GitHub Secrets with the SAME token"
            echo "   7. Re-run this workflow"
            echo ""
            echo "⚠️  Note: Just adding permissions isn't enough - you must update the GitHub Secret"
            echo "   with the token that has the new permissions."
            exit 1
          else
            echo "⚠️  Unexpected response from container API (may be OK if containers aren't needed)"
          fi
          
          echo ""
          echo "📋 All Required API Token Permissions:"
          echo "   ✅ Account → Workers Scripts → Edit"
          echo "   ✅ Account → D1 → Edit"
          echo "   ✅ Account → Containers → Edit (for containers)"
          echo "   ✅ Account → Account Settings → Read (for container registry)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create D1 database if it doesn't exist
        run: |
          echo "Checking for D1 database: vibesdk-db"
          DB_LIST=$(npx wrangler d1 list 2>&1 || echo "")
          
          if echo "$DB_LIST" | grep -q "vibesdk-db"; then
            echo "✅ Database vibesdk-db already exists"
            # Extract and display database ID
            DB_ID=$(echo "$DB_LIST" | grep "vibesdk-db" | head -1 | awk '{print $2}' || echo "")
            if [ -n "$DB_ID" ]; then
              echo "Database ID: $DB_ID"
            fi
          else
            echo "Creating D1 database: vibesdk-db"
            DB_OUTPUT=$(npx wrangler d1 create vibesdk-db 2>&1)
            echo "$DB_OUTPUT"
            
            if [ $? -eq 0 ]; then
              echo "✅ Database created successfully"
              # Extract database ID from output
              DB_ID=$(echo "$DB_OUTPUT" | grep -o 'database_id = "[^"]*"' | sed 's/database_id = "\(.*\)"/\1/' || echo "")
              if [ -n "$DB_ID" ]; then
                echo "New Database ID: $DB_ID"
                echo "⚠️  IMPORTANT: Update database_id in wrangler.jsonc to: $DB_ID"
                echo "⚠️  Or the deployment will fail with database not found error"
              fi
            else
              echo "❌ Failed to create database"
              exit 1
            fi
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create .prod.vars file
        run: |
          cat > .prod.vars << EOF
          # Cloudflare Credentials
          CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          
          # Environment
          ENVIRONMENT="${{ secrets.ENVIRONMENT || 'dev' }}"
          
          # AI Gateway
          CLOUDFLARE_AI_GATEWAY_TOKEN="${{ secrets.CLOUDFLARE_AI_GATEWAY_TOKEN }}"
          CLOUDFLARE_AI_GATEWAY_URL="${{ secrets.CLOUDFLARE_AI_GATEWAY_URL }}"
          
          # Provider API Keys
          GOOGLE_AI_STUDIO_API_KEY="${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}"
          ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
          OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}"
          GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}"
          
          # OAuth (optional)
          GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
          GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
          GITHUB_CLIENT_ID="${{ secrets.GITHUB_CLIENT_ID }}"
          GITHUB_CLIENT_SECRET="${{ secrets.GITHUB_CLIENT_SECRET }}"
          GITHUB_EXPORTER_CLIENT_ID="${{ secrets.GITHUB_EXPORTER_CLIENT_ID }}"
          GITHUB_EXPORTER_CLIENT_SECRET="${{ secrets.GITHUB_EXPORTER_CLIENT_SECRET }}"
          
          # Security
          JWT_SECRET="${{ secrets.JWT_SECRET }}"
          WEBHOOK_SECRET="${{ secrets.WEBHOOK_SECRET }}"
          
          # Custom Domain (optional)
          CUSTOM_DOMAIN="${{ secrets.CUSTOM_DOMAIN }}"
          
          # Sandbox Configuration
          MAX_SANDBOX_INSTANCES="${{ secrets.MAX_SANDBOX_INSTANCES }}"
          SANDBOX_INSTANCE_TYPE="${{ secrets.SANDBOX_INSTANCE_TYPE }}"
          EOF

      - name: Authenticate Docker to Cloudflare Registry
        run: |
          echo "🔐 Authenticating Docker to Cloudflare container registry..."
          # Get Cloudflare account email from API
          ACCOUNT_EMAIL=$(curl -s -X GET "https://api.cloudflare.com/client/v4/user" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | jq -r '.result.email // empty')
          
          if [ -z "$ACCOUNT_EMAIL" ]; then
            echo "⚠️  Could not retrieve account email, trying alternative authentication method"
            # Try using API token directly as username
            echo "$CLOUDFLARE_API_TOKEN" | docker login registry.cloudflare.com -u "$CLOUDFLARE_ACCOUNT_ID" --password-stdin || echo "Docker login failed, wrangler will handle authentication"
          else
            echo "Using account email: $ACCOUNT_EMAIL"
            echo "$CLOUDFLARE_API_TOKEN" | docker login registry.cloudflare.com -u "$ACCOUNT_EMAIL" --password-stdin || echo "Docker login failed, wrangler will handle authentication"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check Wrangler Logs on Failure
        if: failure()
        run: |
          echo "📋 Checking wrangler logs for detailed error information..."
          if ls "$HOME/.config/.wrangler/logs/"*.log 1> /dev/null 2>&1; then
            echo "Latest wrangler log:"
            LATEST_LOG=$(ls -t "$HOME/.config/.wrangler/logs/"*.log | head -1)
            tail -100 "$LATEST_LOG" || echo "Could not read log file"
          else
            echo "No wrangler log files found"
          fi

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Your app should be available at your configured domain or workers.dev URL"

