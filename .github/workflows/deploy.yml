name: Deploy to Cloudflare

# Required API Token Permissions:
# - Account → Workers Scripts → Edit
# - Account → Workers KV Storage → Edit
# - Account → D1 → Edit
# - Account → Containers → Edit
# - Account → Account Settings → Read (CRITICAL for container registry push)
# - Account → R2 Storage → Edit (if using R2)
# - Account → AI Gateway → Read, Edit, Run
#
# IMPORTANT: Container registry push requires "Account Settings: Read" permission!
# Without this, you'll get "Unauthorized" errors even with Containers:Edit.

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify API Token Permissions
        run: |
          echo "🔍 Verifying API token permissions..."
          TOKEN_VERIFY=$(curl -s -X GET "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          
          echo "$TOKEN_VERIFY" | jq '.' || echo "$TOKEN_VERIFY"
          
          if echo "$TOKEN_VERIFY" | grep -q '"status":"active"'; then
            echo "✅ API token is active"
          else
            echo "❌ API token verification failed"
            echo "Please check that CLOUDFLARE_API_TOKEN secret is set correctly"
            exit 1
          fi
          
          echo ""
          echo "📋 Required API Token Permissions for Containers:"
          echo "   ✅ Account → Containers → Edit (CRITICAL)"
          echo "   ✅ Account → Account Settings → Read (REQUIRED for registry)"
          echo "   ✅ Account → Workers Scripts → Edit"
          echo "   ✅ Account → D1 → Edit"
          echo ""
          echo "⚠️  If you're getting 'Unauthorized' errors, ensure your token has:"
          echo "   - Account Settings: Read permission (needed for container registry)"
          echo "   - Containers: Edit permission"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create D1 database if it doesn't exist
        run: |
          echo "Checking for D1 database: vibesdk-db"
          DB_LIST=$(npx wrangler d1 list 2>&1 || echo "")
          
          if echo "$DB_LIST" | grep -q "vibesdk-db"; then
            echo "✅ Database vibesdk-db already exists"
            # Extract and display database ID
            DB_ID=$(echo "$DB_LIST" | grep "vibesdk-db" | head -1 | awk '{print $2}' || echo "")
            if [ -n "$DB_ID" ]; then
              echo "Database ID: $DB_ID"
            fi
          else
            echo "Creating D1 database: vibesdk-db"
            DB_OUTPUT=$(npx wrangler d1 create vibesdk-db 2>&1)
            echo "$DB_OUTPUT"
            
            if [ $? -eq 0 ]; then
              echo "✅ Database created successfully"
              # Extract database ID from output
              DB_ID=$(echo "$DB_OUTPUT" | grep -o 'database_id = "[^"]*"' | sed 's/database_id = "\(.*\)"/\1/' || echo "")
              if [ -n "$DB_ID" ]; then
                echo "New Database ID: $DB_ID"
                echo "⚠️  IMPORTANT: Update database_id in wrangler.jsonc to: $DB_ID"
                echo "⚠️  Or the deployment will fail with database not found error"
              fi
            else
              echo "❌ Failed to create database"
              exit 1
            fi
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create .prod.vars file
        run: |
          cat > .prod.vars << EOF
          # Cloudflare Credentials
          CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          
          # Environment
          ENVIRONMENT="${{ secrets.ENVIRONMENT || 'dev' }}"
          
          # AI Gateway
          CLOUDFLARE_AI_GATEWAY_TOKEN="${{ secrets.CLOUDFLARE_AI_GATEWAY_TOKEN }}"
          CLOUDFLARE_AI_GATEWAY_URL="${{ secrets.CLOUDFLARE_AI_GATEWAY_URL }}"
          
          # Provider API Keys
          GOOGLE_AI_STUDIO_API_KEY="${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}"
          ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
          OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}"
          GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}"
          
          # OAuth (optional)
          GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
          GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
          GITHUB_CLIENT_ID="${{ secrets.GITHUB_CLIENT_ID }}"
          GITHUB_CLIENT_SECRET="${{ secrets.GITHUB_CLIENT_SECRET }}"
          GITHUB_EXPORTER_CLIENT_ID="${{ secrets.GITHUB_EXPORTER_CLIENT_ID }}"
          GITHUB_EXPORTER_CLIENT_SECRET="${{ secrets.GITHUB_EXPORTER_CLIENT_SECRET }}"
          
          # Security
          JWT_SECRET="${{ secrets.JWT_SECRET }}"
          WEBHOOK_SECRET="${{ secrets.WEBHOOK_SECRET }}"
          
          # Custom Domain (optional)
          CUSTOM_DOMAIN="${{ secrets.CUSTOM_DOMAIN }}"
          
          # Sandbox Configuration
          MAX_SANDBOX_INSTANCES="${{ secrets.MAX_SANDBOX_INSTANCES }}"
          SANDBOX_INSTANCE_TYPE="${{ secrets.SANDBOX_INSTANCE_TYPE }}"
          EOF

      - name: Deploy to Cloudflare
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Your app should be available at your configured domain or workers.dev URL"

